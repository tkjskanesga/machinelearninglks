name: Continues Integration
# Only For Github!, Not CICD Pipeline For AWS

on:
  push:
    branches:
      - main

jobs:
  # Init Jobs
  execute-init:
    runs-on: ubuntu-22.04
    outputs:
      VERSION_IMAGE: ${{ steps.getversion.outputs.VERSION_IMAGE }}
    steps:
      - name: Github Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup QEMU Action
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
      - name: Login GCHR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Versioning By Date "yyyy-mm-dd-hh-mm-ss"
        id: getversion
        run: |
          VERSION_IMAGE=$(date +"%Y-%m-%d-%H-%M-%S")
          echo "Version Now: $VERSION_IMAGE"
          echo "VERSION_IMAGE=$VERSION_IMAGE" >> $GITHUB_ENV
          echo "VERSION_IMAGE=$VERSION_IMAGE" >> $GITHUB_OUTPUT

  # Build Image Frontend
  build-frontend:
    runs-on: ubuntu-22.04
    needs:
      - execute-init
    permissions:
      contents: read
      packages: write
    steps:
      - name: Github Checkout
        uses: actions/checkout@v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Image Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./newfront/
          file: ./newfront/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            TARGET=production
          tags: |
            ghcr.io/${{ github.repository }}:frontend-${{ needs.execute-init.outputs.VERSION_IMAGE }}
          provenance: false

  # Build Image LLM Integrate SNS
  build-llm-integrate-sns:
    runs-on: ubuntu-22.04
    needs:
      - execute-init
    permissions:
      contents: read
      packages: write
    steps:
      - name: Github Checkout
        uses: actions/checkout@v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Image LLM Integrate SNS
        uses: docker/build-push-action@v5
        with:
          context: ./llm-integrate-sns/
          file: ./llm-integrate-sns/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            TARGET=production
          tags: |
            ghcr.io/${{ github.repository }}:llm-webhook-${{ needs.execute-init.outputs.VERSION_IMAGE }}
          provenance: false

  # Build Example Dataset CSV
  build-example-dataset-csv:
    runs-on: ubuntu-22.04
    needs:
      - execute-init
    permissions:
      contents: write
    steps:
      - name: Github Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 
      - name: Installation Dependencies
        run: |
          cd ./dataset
          python -m pip install --upgrade pip
          pip install pandas numpy
      - name: Create Example Dataset CSV
        run: |
          cd ./dataset
          python dataset.py
      - name: Upload CSV to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dataset
          name: "Dataset CSV"
          body: |
            ## Image Version

            - **Frontend:** `ghcr.io/${{ github.repository }}:frontend-${{ needs.execute-init.outputs.VERSION_IMAGE }}`
            - **LLM Integrate SNS:** `ghcr.io/${{ github.repository }}:llm-webhook-${{ needs.execute-init.outputs.VERSION_IMAGE }}`
            
            ## Example Dataset 📊
            
            This is an auto-generated dataset CSV file created by the CI/CD pipeline.
            
            **Source:** Generated from [`dataset/dataset.py`](https://github.com/tkjskanesga/machinelearninglks/blob/main/dataset/dataset.py)
          files: ./dataset/*.csv
          make_latest: true